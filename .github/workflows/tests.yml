name: Tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile pure Python modules
        run: python -m py_compile LootTreadmill/__init__.py LootTreadmill/profiles.py LootTreadmill/boss_pools.py
      - name: Run tests
        run: python -m unittest discover -s tests -v
